<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Process Failed | MED-SEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fce4ec; }
        .failure-card { border-radius: 15px; margin-top: 50px; border-left: 10px solid #d32f2f; }
        .hash-display { background: #fff; padding: 10px; border: 1px solid #ffcdd2; border-radius: 8px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card failure-card shadow p-5">
                    <h2 class="text-danger mb-4">Verification Failed</h2>
                    <div class="alert alert-danger">
                        <strong>System Message:</strong> {{ reason }}
                    </div>
                    <div class="mt-4">
                        <p class="mb-1 text-muted small">File Identity (SHA-256):</p>
                        <div class="hash-display text-break">{{ file_hash }}</div>
                    </div>
                    <div class="mt-5 text-center">
                        <a href="/" class="btn btn-danger px-5 shadow-sm">Upload Valid Clinical Data</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
